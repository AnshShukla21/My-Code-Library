<script>

// Load notes
window.onload = function(){
    let saved = JSON.parse(localStorage.getItem("notes")) || [];
    saved.forEach(n => createNote(n));
};

// Add note
function addNote(){
    let input = document.getElementById("noteInput");
    let text = input.value.trim();
    if(text === "") return;

    createNote(text);
    saveNotes();
    input.value = "";
}

// Create note
function createNote(text){
    let div = document.createElement("div");
    div.className = "note";

    div.innerHTML = `
        <span>${text}</span>
        <button onclick="deleteNote(this)">❌</button>
    `;

    document.getElementById("notesList").appendChild(div);
}

// Delete
function deleteNote(btn){
    btn.parentElement.remove();
    saveNotes();
}

// Save
function saveNotes(){
    let notes = [];
    document.querySelectorAll(".note span").forEach(n=>{
        notes.push(n.innerText);
    });
    localStorage.setItem("notes", JSON.stringify(notes));
}

// 🔥 Card click (UPDATED)
function openPage(type){

    if(type === "portfolio"){
        window.open("portfolio.pdf", "_blank"); // 👈 yaha apni file ka naam daalo
    }

    else if(type === "login"){
        window.open("login.html", "_blank");
    }

    else if(type === "navbar"){
        window.open("navbar.html", "_blank");
    }
}

</script>
